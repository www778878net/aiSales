# aiSales 配置文件示例
# 请复制此文件为 config.ini 并填写您的真实配置

[modelscope]
# ModelScope API 配置
api_url=https://api-inference.modelscope.cn/v1
api_key=YOUR_MODELSCOPE_API_KEY_HERE
model=ZhipuAI/GLM-5

[volces]
# Volces API 配置（可选）
api_url=https://ark.cn-beijing.volces.com/api/v3
api_key=YOUR_VOLCES_API_KEY_HERE
model=deepseek-v3-2-251201

[openai]
# OpenAI API 配置（可选）
api_url=https://api.openai.com/v1
api_key=YOUR_OPENAI_API_KEY_HERE
model=gpt-3.5-turbo

[deepseek]
# DeepSeek API 配置（可选）
api_url=https://api.deepseek.com/v1
api_key=YOUR_DEEPSEEK_API_KEY_HERE
model=deepseek-chat

[llm]
# 当前使用的 LLM 提供商
current_provider=modelscope

[platforms]
# 启用的平台
xiaohongshu=true
zhihu=false

[general]
# 任务设置
page_wait_time=10
comment_interval=10
max_notes=5
accounts=YOUR_ACCOUNT_PHONE
keywords=关键词1,关键词2,关键词3
